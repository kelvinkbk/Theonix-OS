#
# Theonix OS — shellprocess config for post-install customization.
# Runs theonix-postinstall.sh inside the target chroot to configure
# services, themes, GRUB, and first-boot markers.
---
dontChroot: true
timeout: 300

script:
  - "arch-chroot \"${ROOT}\" bash /etc/calamares/modules/theonix-postinstall.sh"
